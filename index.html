<html lang="vi">

<title>SYSTEM IOS</title>
<style>

body{
margin:0;
background:#0c0c0c;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
display:flex;
justify-content:center;

/* LOGIN CARD */

.login-box{
width:320px;
background:#121212;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,255,0.15);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}
<img class="app-logo"
src="https://sf-static.upanhlaylink.com/img/image_20260315bfb9fa385a7398288bdc9b36a876e91e.jpg">
.title{
font-size:28px;
color:#00eaff;
margin-bottom:10px;
}

.subtitle{
opacity:.7;
margin-bottom:20px;
}

.key-input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:#1a1a1a;
color:white;
margin-bottom:15px;
font-size:15px;
}

.login-btn{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#00eaff;
color:black;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.login-btn:active{
transform:scale(.96);
}

.status{
margin-top:12px;
font-size:14px;
opacity:.8;
min-height:20px;
}

.loader{
width:25px;
height:25px;
border:3px solid #444;
border-top:3px solid #00eaff;
border-radius:50%;
margin:10px auto;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>

<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<div class="login-box">

<img class="app-logo"
src="https://sf-static.upanhlaylink.com/img/image_20260315bfb9fa385a7398288bdc9b36a876e91e.jpg">

<div class="title">SYSTEM IOS</div>
<div class="subtitle">KEY LOGIN</div>

<input id="keyInput" class="key-input" placeholder="Nhập key của bạn vào">

<button id="loginBtn" class="login-btn">
LOGIN
</button>

<div id="loader" class="loader"></div>

<div id="status" class="status"></div>

<!-- CONTACT -->

<div class="contact">

<h3>CONTACT</h3>

<div class="social">

<a href="https://zalo.me/0396134792" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
</a>

<a href="https://facebook.com/cducdz" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png">
</a>

</div>

<div class="footer">by NgChiDuc</div>

</div>

</div>

<script>

/* ================= CONFIG ================= */

const SERVER_URL="https://apikey-production-8bb0.up.railway.app/";

/* ================= DEVICE ID ================= */

let deviceId =
localStorage.getItem("SYSTEMIOS_DEVICE") || createDevice();

function createDevice(){
let id="SYS-"+Date.now()+"-"+Math.random().toString(36).substr(2,6);
localStorage.setItem("SYSTEMIOS_DEVICE",id);
return id;
}

/* ================= CHECK KEY ================= */
async function checkKey(key, auto = false) {
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");
    const btn = document.getElementById("loginBtn");

    if (!auto) {
        loader.style.display = "block";
        btn.disabled = true;
    }
    status.innerText = "Checking key...";

    try {
        const res = await fetch(SERVER_URL + "checkKey", { // Đã sửa đường dẫn URL
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                key: key,
                deviceId: deviceId
            })
        });

        const data = await res.json();

        loader.style.display = "none";
        btn.disabled = false;

        if (data.success) {
            status.innerText = "✅ Login success";
            localStorage.setItem("SYSTEMIOS_KEY", key);

            /* LOAD MENU */
            setTimeout(() => {
                showMenu(data.daysLeft);
                startGalaxy();
            }, 700);
        } else {
            status.innerText = "❌ " + (data.message || "Key không hợp lệ");
            localStorage.removeItem("SYSTEMIOS_KEY");
        }

    } catch (e) {
        console.error("Lỗi kết nối server:", e);
        loader.style.display = "none";
        btn.disabled = false;
        status.innerText = "❌ Không thể kết nối đến Server";
    }
}

/* ================= LOGIN CLICK ================= */

document.getElementById("loginBtn").onclick=()=>{

const key=document.getElementById("keyInput").value.trim();

if(!key){
document.getElementById("status").innerText="Vui lòng nhập key";
return;
}

checkKey(key,false);
};

/* ================= AUTO LOGIN ================= */

const savedKey=localStorage.getItem("SYSTEMIOS_KEY");

if(savedKey){
document.getElementById("keyInput").value=savedKey;
checkKey(savedKey,true);
}

/* ================= BASIC PROTECTION ================= */

document.addEventListener("keydown",(e)=>{
if(e.keyCode==123) e.preventDefault();
if(e.ctrlKey && e.shiftKey && e.keyCode==73) e.preventDefault();
if(e.ctrlKey && e.keyCode==85) e.preventDefault();
});

document.oncontextmenu=()=>false;

</script>
<div id="loadingBlur" class="loadingBlur">
<div class="iosLoader"></div>
</div>
<script>

/* ===== SHOW MENU ===== */

function showMenu(days){
  

document.body.innerHTML = `

<style>

body{
margin:0;
background:#05070d;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
}

/* HEADER */

.header{
padding:15px;
text-align:center;
border-bottom:1px solid #222;
}

.app-icon{
width:70px;
height:70px;
border-radius:20px;
margin:auto;
display:block;
box-shadow:0 0 20px #00eaff55;
}

.app-name{
font-size:22px;
margin-top:8px;
color:#00eaff;
letter-spacing:1px;
}


/* MENU */

.menu{
padding:15px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#0f1118;
padding:15px;
margin-bottom:12px;
border-radius:14px;
}

.item-left{
display:flex;
align-items:center;
gap:12px;
font-size:16px;
}

/* SWITCH */

.switch{
width:50px;
height:26px;
background:#333;
border-radius:20px;
position:relative;
cursor:pointer;
transition:.3s;
}

.switch::after{
content:"";
width:22px;
height:22px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:3px;
transition:.3s;
}

.switch.active{
background:#00eaff;
}

.switch.active::after{
left:25px;
}

/* TOAST */

.toast{
position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
background:#2c9cff;
padding:18px 25px;
border-radius:14px;
font-size:16px;
box-shadow:0 0 20px rgba(0,0,0,.5);
animation:fadeToast 3s forwards;
}

@keyframes fadeToast{
0%{opacity:0;transform:translate(-50%,-40%)}
10%{opacity:1}
90%{opacity:1}
100%{opacity:0}
}

</style>


<div class="header">

<img class="app-icon"
src="https://sf-static.upanhlaylink.com/img/image_20260315bfb9fa385a7398288bdc9b36a876e91e.jpg">
<div class="app-name">SYSTEM IOS</div>
<div class="status-bar" id="sysStatus">
🔄 Checking system...
</div>

</div>


<div class="menu">

<div class="item">
<div class="item-left">BOOST FPS</div>
<div class="switch"></div>
</div>

<div class="item">
<div class="item-left">OPTIMIZER (CPU,GPU,RAM)</div>
<div class="switch"></div>
</div>

<div class="item">
<div class="item-left">FIX RUNG</div>
<div class="switch"></div>
</div>

<div class="item">
<div class="item-left">MAX PERFORMANCE</div>
<div class="switch"></div>
</div>

<div class="item">
<div class="item-left">BOOST Free Fire</div>
<div class="switch"></div>
</div>

<div class="item">
<div class="item-left">BOOST Free Fire Max</div>
<div class="switch"></div>
</div>

</div>

<div class="toast">
Đăng nhập thành công! Còn ${days} ngày
</div>
<div class="contact">

<div class="social">

<a href="https://zalo.me/0396134792" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
</a>

<a href="https://facebook.com/cducdz" target="_blank">

</a>

</div>

<div class="footer">by NgChiDuc</div>

</div>
<div id="codeBox" class="codeBox">
<div class="codeHeader">SYSTEM PROCESS</div>

`;

initSwitch();

checkSystemStatus();
async function checkSystemStatus(){

const el=document.getElementById("sysStatus");

let ios = /iPhone|iPad|Mac/i.test(navigator.userAgent);

let serverOK=false;

try{
const r = await fetch(SERVER_URL);
serverOK = r.ok;
}catch(e){}

el.innerHTML =
`📱 IOS: ${ios ? "✅ Supported" : "⚠️ Unknown"} | 🌐 Server: ${serverOK ? "🟢 Online" : "🔴 Offline"}`;
}
}


/* ===== SWITCH LOGIC ===== */

function initSwitch(){

document.querySelectorAll(".switch").forEach(sw=>{

sw.onclick=()=>{

sw.classList.toggle("active");

const name =
sw.parentElement.querySelector(".item-left").innerText;

const active = sw.classList.contains("active");

showToast(name + (active ? " ON" : " OFF"));

if(active && (name.includes("BOOST") || name.includes("OPTIMIZER"))){
runCode(name);
}

};

});

}
function startParticles(){

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
vx:(Math.random()-.5)*0.3,
vy:(Math.random()-.5)*0.3
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00eaff";
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();
}

/* ===== GALAXY 3D ===== */

function startGalaxy(){

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

renderer.domElement.style.position="fixed";
renderer.domElement.style.top="0";
renderer.domElement.style.zIndex="-1";

document.body.appendChild(renderer.domElement);

/* stars */

const geometry = new THREE.BufferGeometry();
const vertices = [];

for(let i=0;i<6000;i++){

vertices.push(
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
);

}

geometry.setAttribute(
"position",
new THREE.Float32BufferAttribute(vertices,3)
);

const material = new THREE.PointsMaterial({ size:1.4, color:0xffffff });


const stars = new THREE.Points(geometry,material);
scene.add(stars);

camera.position.z = 5;

/* animation */

function animate(){

requestAnimationFrame(animate);

stars.rotation.x += 0.0003;
stars.rotation.y += 0.0005;

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

}

</script>
